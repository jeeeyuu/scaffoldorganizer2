<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="ScaffoldOrganizer 2.0 — Done tab">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#26835b" stop-opacity="0.11"/><stop offset="0.35" stop-color="#26835b" stop-opacity="0"/></linearGradient>
    <linearGradient id="bgB" x1="1" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2f6fa6" stop-opacity="0.12"/><stop offset="0.38" stop-color="#2f6fa6" stop-opacity="0"/></linearGradient>
    <style><![CDATA[
      text { font-family: "Noto Sans KR", "Noto Sans", "Malgun Gothic", sans-serif; fill: #1e2528; }
      .tab { font-size: 10px; } .tab-active { font-size: 10px; fill: #2f6fa6; font-weight: 700; }
      .title { font-size: 11.5px; font-weight: 700; fill: #667277; }
      .body { font-size: 10px; fill: #667277; } .btn { font-size: 9.5px; }
      .dot-label { font-size: 9px; } .h1 { font-size: 16px; font-weight: 800; letter-spacing: -0.01em; }
      .feedback { font-size: 10px; fill: #667277; }
      .cmd-placeholder { font-size: 11px; fill: #667277; font-style: italic; }
      .count { font-size: 10px; fill: #667277; }
      .chip { font-size: 8.5px; font-weight: 700; fill: #ffffff; }
    ]]></style>
  </defs>

  <rect width="600" height="400" fill="#f7f4ed"/><rect width="600" height="400" fill="url(#bgA)"/><rect width="600" height="400" fill="url(#bgB)"/>

  <g transform="translate(12, 14)">
