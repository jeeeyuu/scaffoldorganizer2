  <g transform="translate(0, 340)">
    <rect x="0" y="0" width="600" height="60" fill="rgba(247,244,237,0.96)"/>
    <line x1="0" y1="0" x2="600" y2="0" stroke="#d9d1c3"/>
    <rect x="12" y="10" rx="5" ry="5" width="490" height="40" fill="#fffdf8" stroke="#d9d1c3"/>
