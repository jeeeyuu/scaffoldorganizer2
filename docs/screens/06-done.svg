    <text class="feedback" y="30">Ready</text>
    <g transform="translate(372, 2)">
      <rect x="0"   y="0" rx="9" ry="9" width="62" height="17" fill="#fffdf8" stroke="#d9d1c3"/><circle cx="9"   cy="8.5" r="3" fill="#26835b"/><text class="dot-label" x="17"  y="12" fill="#26835b">Backend</text>
      <rect x="66"  y="0" rx="9" ry="9" width="62" height="17" fill="#fffdf8" stroke="#d9d1c3"/><circle cx="75"  cy="8.5" r="3" fill="#26835b"/><text class="dot-label" x="83"  y="12" fill="#26835b">Telegram</text>
      <rect x="132" y="0" rx="9" ry="9" width="38" height="17" fill="#fffdf8" stroke="#d9d1c3"/><circle cx="141" cy="8.5" r="3" fill="#26835b"/><text class="dot-label" x="149" y="12" fill="#26835b">AI</text>
    </g>
  </g>

  <g transform="translate(12, 52)">
    <rect x="0"   y="0" rx="4" ry="4" width="40" height="22" fill="#fffdf8" stroke="#d9d1c3"/><text class="btn" x="20" y="15" text-anchor="middle">Save</text>
    <rect x="44"  y="0" rx="4" ry="4" width="40" height="22" fill="#fffdf8" stroke="#d9d1c3"/><text class="btn" x="64" y="15" text-anchor="middle">Load</text>
    <rect x="88"  y="0" rx="4" ry="4" width="44" height="22" fill="#fffdf8" stroke="#d9d1c3"/><text class="btn" x="110" y="15" text-anchor="middle">Reset</text>
    <rect x="136" y="0" rx="4" ry="4" width="48" height="22" fill="#fffdf8" stroke="#d9d1c3"/><text class="btn" x="160" y="15" text-anchor="middle">Export</text>
    <rect x="188" y="0" rx="4" ry="4" width="64" height="22" fill="#fffdf8" stroke="#d9d1c3"/><text class="btn" x="220" y="15" text-anchor="middle">Work Log</text>
