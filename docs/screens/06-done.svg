        <rect x="240" y="0" rx="3" ry="3" width="18" height="16" fill="#fffdf8" stroke="#d9d1c3"/><text class="btn" x="249" y="11" text-anchor="middle">✎</text>
      </g>
    </g>

    <g transform="translate(294, 40)" opacity="0.72">
      <rect x="0" y="0" rx="6" ry="6" width="272" height="78" fill="#fffdf8" stroke="#d9d1c3"/>
      <rect x="0" y="0" width="4" height="78" fill="#667277"/>
      <rect x="12" y="10" width="11" height="11" rx="2" fill="#fffdf8" stroke="#d9d1c3"/>
