      <rect x="0" y="0" rx="6" ry="6" width="272" height="78" fill="#fffdf8" stroke="#d9d1c3"/>
      <rect x="0" y="0" width="4" height="78" fill="#667277"/>
      <rect x="12" y="10" width="11" height="11" rx="2" fill="#fffdf8" stroke="#d9d1c3"/>
      <text class="title" x="28" y="19" text-decoration="line-through">Telegram allowlist 로그 강화</text>
      <rect x="238" y="8" rx="9" ry="9" width="26" height="13" fill="#b97118"/>
      <text class="chip" x="251" y="17" text-anchor="middle">P2</text>
      <text class="body" x="12" y="35">drop 시 chat_id / title 로깅.</text>
      <text class="body" x="12" y="47">✓ 2026-04-20 17:02 완료</text>
      <g transform="translate(10, 56)">
        <rect x="0" y="0" rx="3" ry="3" width="18" height="16" fill="#fffdf8" stroke="#d9d1c3"/><text class="btn" x="9" y="11" text-anchor="middle">🗑</text>
        <rect x="240" y="0" rx="3" ry="3" width="18" height="16" fill="#fffdf8" stroke="#d9d1c3"/><text class="btn" x="249" y="11" text-anchor="middle">✎</text>
