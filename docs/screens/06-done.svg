    <rect x="510" y="10" rx="5" ry="5" width="78" height="40" fill="#fffdf8" stroke="#2f6fa6"/>
    <text class="btn" x="549" y="35" text-anchor="middle" fill="#2f6fa6" font-weight="700">Send</text>
