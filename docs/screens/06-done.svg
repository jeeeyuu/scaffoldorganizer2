    <rect x="228" y="0" rx="4" ry="4" width="58" height="20" fill="#fffdf8" stroke="#d9d1c3"/><text class="tab" x="257" y="13.5" text-anchor="middle">Work Log</text>
    <rect x="290" y="0" rx="4" ry="4" width="44" height="20" fill="#fffdf8" stroke="#2f6fa6"/><text class="tab-active" x="312" y="13.5" text-anchor="middle">Done</text>
